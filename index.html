<!--
╔══════════════════════════════════════════════════════════════════╗
║  UNIVERSAL MULTITENANT CHAT WIDGET                              ║
║  Pulls all tenant config (colors, logo, prompt) from n8n       ║
║                                                                  ║
║  HOW TO EMBED ON ANY TENANT WEBSITE:                            ║
║  Just paste this ONE line before </body>:                        ║
║                                                                  ║
║  <script src="https://yourdomain.com/chat-widget.js"           ║
║          data-tenant="barts-automotive"                          ║
║          data-config-url="https://n8n.sellsy.ai/webhook/config" ║
║  ></script>                                                      ║
║                                                                  ║
║  That's it. Everything else is pulled from your Google Sheet.    ║
║                                                                  ║
║  ── GOOGLE SHEET COLUMNS NEEDED ──                              ║
║  A: tenant_id        → "barts-automotive"                       ║
║  B: business_name    → "Bart's Automotive"                      ║
║  C: primary_color    → "#2563eb"                                ║
║  D: accent_color     → "#1d4ed8"                                ║
║  E: logo_url         → "https://example.com/logo.png"          ║
║  F: welcome_message  → "Hi! How can we help?"                  ║
║  G: system_prompt    → "You are a support agent for..."        ║
║  H: webhook_url      → "https://n8n.sellsy.ai/webhook/chat"   ║
║  I: online_text      → "Typically replies instantly"            ║
║                                                                  ║
║  ── N8N WORKFLOWS NEEDED ──                                     ║
║  1. CONFIG WEBHOOK: receives { tenant_id }, looks up the row    ║
║     in Google Sheets, returns the full config JSON.             ║
║  2. CHAT WEBHOOK: receives { message, identifier, systemPrompt}║
║     routes to AI Agent, returns the response.                   ║
║     (You already have this one built!)                           ║
╚══════════════════════════════════════════════════════════════════╝
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Widget — Multitenant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');

  #scw-root * {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  /* ─── Container ─── */
  #scw-root {
    --scw-primary: #2563eb;
    --scw-primary-dark: #1d4ed8;
    --scw-primary-soft: #dbeafe;
    --scw-bg: #ffffff;
    --scw-bg-alt: #f8fafc;
    --scw-text: #1e293b;
    --scw-muted: #64748b;
    --scw-border: #e2e8f0;
    --scw-radius: 18px;
    --scw-shadow: 0 25px 60px -12px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.03);

    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999999;
    font-size: 15px;
    line-height: 1.5;
  }

  /* ─── Loading Overlay ─── */
  #scw-root .scw-loading-overlay {
    position: absolute;
    inset: 0;
    background: var(--scw-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    border-radius: var(--scw-radius);
    transition: opacity 0.4s ease;
  }

  #scw-root .scw-loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #scw-root .scw-loader {
    width: 32px; height: 32px;
    border: 3px solid var(--scw-border);
    border-top-color: var(--scw-primary);
    border-radius: 50%;
    animation: scwSpin 0.7s linear infinite;
  }

  @keyframes scwSpin { to { transform: rotate(360deg); } }

  #scw-root .scw-loading-text {
    font-size: 13px; color: var(--scw-muted); font-weight: 500;
  }

  /* ─── Error Banner ─── */
  #scw-root .scw-error-banner {
    display: none;
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #991b1b;
    font-size: 13px;
    padding: 10px 14px;
    text-align: center;
    flex-shrink: 0;
  }

  #scw-root .scw-error-banner.show { display: block; }

  #scw-root .scw-error-banner button {
    background: none; border: none; color: #2563eb;
    text-decoration: underline; cursor: pointer; font-family: inherit;
    font-size: 13px; margin-left: 6px;
  }

  /* ─── Bubble ─── */
  #scw-root .scw-bubble {
    width: 62px; height: 62px;
    border-radius: 50%;
    background: var(--scw-primary);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.18), 0 0 0 0 transparent;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  #scw-root .scw-bubble:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 32px rgba(0,0,0,0.22);
  }

  #scw-root .scw-bubble::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 60%);
    pointer-events: none;
  }

  #scw-root .scw-bubble img.scw-bubble-logo {
    width: 34px; height: 34px; border-radius: 50%; object-fit: cover;
    position: relative; z-index: 1;
    transition: opacity 0.25s, transform 0.25s;
  }

  #scw-root .scw-bubble svg {
    width: 28px; height: 28px; fill: white;
    position: absolute;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 1;
  }

  #scw-root .scw-bubble .scw-icon-chat { opacity: 1; transform: scale(1) rotate(0); }
  #scw-root .scw-bubble .scw-icon-close { opacity: 0; transform: scale(0.5) rotate(-90deg); }

  #scw-root .scw-bubble.open .scw-icon-chat,
  #scw-root .scw-bubble.open .scw-bubble-logo { opacity: 0; transform: scale(0.5) rotate(90deg); }
  #scw-root .scw-bubble.open .scw-icon-close { opacity: 1; transform: scale(1) rotate(0); }

  /* Badge */
  #scw-root .scw-badge {
    position: absolute; top: -3px; right: -3px;
    width: 18px; height: 18px;
    background: #ef4444; border-radius: 50%;
    border: 2.5px solid white;
    display: none; z-index: 2;
  }

  #scw-root .scw-badge.show {
    display: block;
    animation: scwPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes scwPop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

  /* ─── Window ─── */
  #scw-root .scw-window {
    position: absolute; bottom: 80px; right: 0;
    width: 390px; max-height: 580px; height: 72vh;
    background: var(--scw-bg);
    border-radius: var(--scw-radius);
    box-shadow: var(--scw-shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px) scale(0.94);
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }

  #scw-root .scw-window.open {
    opacity: 1; transform: translateY(0) scale(1); pointer-events: all;
  }

  /* ─── Header ─── */
  #scw-root .scw-header {
    background: var(--scw-primary);
    color: white;
    padding: 20px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  #scw-root .scw-header::before {
    content: '';
    position: absolute; top: -50%; right: -20%;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    pointer-events: none;
  }

  #scw-root .scw-header-row {
    display: flex; align-items: center; gap: 14px;
    position: relative; z-index: 1;
  }

  #scw-root .scw-header .scw-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 17px; flex-shrink: 0;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  #scw-root .scw-header .scw-avatar img {
    width: 100%; height: 100%; object-fit: cover;
  }

  #scw-root .scw-header .scw-h-name {
    font-size: 16.5px; font-weight: 600; letter-spacing: -0.02em;
  }

  #scw-root .scw-header .scw-h-status {
    font-size: 12.5px; opacity: 0.8;
    display: flex; align-items: center; gap: 6px; margin-top: 2px;
  }

  #scw-root .scw-header .scw-status-dot {
    width: 7px; height: 7px; background: #4ade80;
    border-radius: 50%; display: inline-block;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
  }

  /* ─── Messages ─── */
  #scw-root .scw-messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--scw-bg-alt);
  }

  #scw-root .scw-messages::-webkit-scrollbar { width: 5px; }
  #scw-root .scw-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

  #scw-root .scw-msg {
    max-width: 82%; padding: 10px 15px;
    border-radius: 16px; font-size: 14.5px; line-height: 1.55;
    animation: scwMsg 0.3s ease-out; word-wrap: break-word;
  }

  @keyframes scwMsg { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

  #scw-root .scw-msg.bot {
    align-self: flex-start;
    background: var(--scw-bg);
    color: var(--scw-text);
    border: 1px solid var(--scw-border);
    border-bottom-left-radius: 5px;
  }

  #scw-root .scw-msg.user {
    align-self: flex-end;
    background: var(--scw-primary);
    color: white;
    border-bottom-right-radius: 5px;
  }

  /* Typing */
  #scw-root .scw-typing {
    align-self: flex-start;
    background: var(--scw-bg); border: 1px solid var(--scw-border);
    border-radius: 16px; border-bottom-left-radius: 5px;
    padding: 13px 20px;
    display: none; gap: 5px; align-items: center;
  }

  #scw-root .scw-typing.show { display: flex; }

  #scw-root .scw-typing span {
    width: 7px; height: 7px; background: #94a3b8;
    border-radius: 50%; animation: scwBounce 1.2s infinite;
  }

  #scw-root .scw-typing span:nth-child(2) { animation-delay: 0.15s; }
  #scw-root .scw-typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes scwBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* ─── Input ─── */
  #scw-root .scw-input-area {
    padding: 12px 16px;
    border-top: 1px solid var(--scw-border);
    background: var(--scw-bg);
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
  }

  #scw-root .scw-input-area textarea {
    flex: 1;
    border: 1.5px solid var(--scw-border);
    border-radius: 14px; padding: 10px 14px;
    font-size: 14px; font-family: inherit;
    resize: none; outline: none;
    max-height: 100px; min-height: 44px;
    line-height: 1.45; color: var(--scw-text);
    background: var(--scw-bg-alt);
    transition: border-color 0.2s;
  }

  #scw-root .scw-input-area textarea:focus { border-color: var(--scw-primary); }
  #scw-root .scw-input-area textarea::placeholder { color: var(--scw-muted); }

  #scw-root .scw-send {
    width: 44px; height: 44px;
    border-radius: 14px; border: none;
    background: var(--scw-primary); color: white;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }

  #scw-root .scw-send:hover { background: var(--scw-primary-dark); }
  #scw-root .scw-send:active { transform: scale(0.92); }
  #scw-root .scw-send:disabled { opacity: 0.45; cursor: not-allowed; }
  #scw-root .scw-send svg { width: 20px; height: 20px; fill: currentColor; }

  /* ─── Footer ─── */
  #scw-root .scw-footer {
    text-align: center; padding: 7px;
    font-size: 11px; color: var(--scw-muted);
    background: var(--scw-bg); flex-shrink: 0;
  }

  /* ─── Mobile ─── */
  @media (max-width: 440px) {
    #scw-root .scw-window {
      width: calc(100vw - 20px);
      right: -14px;
      max-height: calc(100vh - 110px);
    }
  }
</style>
</head>
<body>

<div id="scw-root">
  <!-- Bubble -->
  <button class="scw-bubble" id="scwToggle" aria-label="Open chat">
    <img class="scw-bubble-logo" id="scwBubbleLogo" style="display:none" alt="Logo">
    <svg class="scw-icon-chat" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/><path d="M7 9h10v2H7zm0-3h10v2H7zm0 6h7v2H7z"/></svg>
    <svg class="scw-icon-close" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    <div class="scw-badge" id="scwBadge"></div>
  </button>

  <!-- Chat Window -->
  <div class="scw-window" id="scwWindow">
    <!-- Loading Overlay -->
    <div class="scw-loading-overlay" id="scwLoading">
      <div class="scw-loader"></div>
      <span class="scw-loading-text">Loading support...</span>
    </div>

    <!-- Header -->
    <div class="scw-header">
      <div class="scw-header-row">
        <div class="scw-avatar" id="scwAvatar">?</div>
        <div>
          <div class="scw-h-name" id="scwName">Support</div>
          <div class="scw-h-status"><span class="scw-status-dot"></span> <span id="scwOnlineText">Online</span></div>
        </div>
      </div>
    </div>

    <!-- Error -->
    <div class="scw-error-banner" id="scwError">
      Couldn't load config. <button id="scwRetry">Retry</button>
    </div>

    <!-- Messages -->
    <div class="scw-messages" id="scwMessages">
      <div class="scw-typing" id="scwTyping"><span></span><span></span><span></span></div>
    </div>

    <!-- Input -->
    <div class="scw-input-area">
      <textarea id="scwInput" rows="1" placeholder="Type your message..." autocomplete="off"></textarea>
      <button class="scw-send" id="scwSend" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <div class="scw-footer">Powered by AI Support</div>
  </div>
</div>

<script>
(function() {
  // ═══════════════════════════════════════════════════════
  //  EMBED CONFIGURATION
  //  When embedding as a <script> tag, these come from
  //  data attributes. For this standalone HTML demo,
  //  set them here:
  // ═══════════════════════════════════════════════════════
  const TENANT_ID  = "jm20";
  const CONFIG_URL = "https://gpixie.app.n8n.cloud/webhook-test/customer-support";  // n8n config webhook
  // ═══════════════════════════════════════════════════════
  //  In production, your embed snippet looks like:
  //
  //  <script src="https://yourdomain.com/chat-widget.js"
  //          data-tenant="barts-automotive"
  //          data-config-url="https://n8n.sellsy.ai/webhook/config">
  //  <\/script>
  //
  //  The script reads these via:
  //  const el = document.currentScript;
  //  const TENANT_ID = el.getAttribute('data-tenant');
  //  const CONFIG_URL = el.getAttribute('data-config-url');
  // ═══════════════════════════════════════════════════════

  // State
  let config = null;
  let isOpen = false;
  let isLoading = false;
  let configLoaded = false;

  // DOM
  const root     = document.getElementById('scw-root');
  const toggle   = document.getElementById('scwToggle');
  const win      = document.getElementById('scwWindow');
  const msgs     = document.getElementById('scwMessages');
  const input    = document.getElementById('scwInput');
  const sendBtn  = document.getElementById('scwSend');
  const typing   = document.getElementById('scwTyping');
  const badge    = document.getElementById('scwBadge');
  const avatar   = document.getElementById('scwAvatar');
  const nameEl   = document.getElementById('scwName');
  const onlineEl = document.getElementById('scwOnlineText');
  const loading  = document.getElementById('scwLoading');
  const errorEl  = document.getElementById('scwError');
  const retryBtn = document.getElementById('scwRetry');
  const bubLogo  = document.getElementById('scwBubbleLogo');

  // ─── Fetch tenant config from n8n ───
  async function loadConfig() {
    loading.classList.remove('hidden');
    errorEl.classList.remove('show');

    try {
      const res = await fetch(CONFIG_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tenant_id: TENANT_ID })
      });

      config = await res.json();

      // If n8n returns an array, take the first item
      if (Array.isArray(config)) config = config[0];

      applyConfig(config);
      configLoaded = true;

      // Fade out loading
      loading.classList.add('hidden');

      // Show welcome message
      if (config.welcome_message) {
        addMessage(config.welcome_message, 'bot');
      }

    } catch (err) {
      console.error('[ChatWidget] Config load failed:', err);
      loading.classList.add('hidden');
      errorEl.classList.add('show');

      // Fallback — still usable with defaults
      configLoaded = false;
    }
  }

  // ─── Apply config to the UI ───
  function applyConfig(c) {
    // Colors
    if (c.primary_color) {
      root.style.setProperty('--scw-primary', c.primary_color);
      // Auto-generate a slightly darker shade for hover
      root.style.setProperty('--scw-primary-dark', darkenColor(c.primary_color, 15));
    }
    if (c.accent_color) {
      root.style.setProperty('--scw-primary-dark', c.accent_color);
    }

    // Business name
    if (c.business_name) {
      nameEl.textContent = c.business_name;
      avatar.textContent = c.business_name.charAt(0).toUpperCase();
    }

    // Logo
    if (c.logo_url) {
      // Header avatar
      avatar.innerHTML = '';
      const img = document.createElement('img');
      img.src = c.logo_url;
      img.alt = c.business_name || 'Logo';
      avatar.appendChild(img);

      // Bubble logo
      bubLogo.src = c.logo_url;
      bubLogo.style.display = 'block';
    }

    // Online text
    if (c.online_text) {
      onlineEl.textContent = 'Online · ' + c.online_text;
    }
  }

  // ─── Color utility ───
  function darkenColor(hex, percent) {
    hex = hex.replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(c => c + c).join('');
    const num = parseInt(hex, 16);
    const r = Math.max(0, (num >> 16) - Math.round(2.55 * percent));
    const g = Math.max(0, ((num >> 8) & 0x00FF) - Math.round(2.55 * percent));
    const b = Math.max(0, (num & 0x0000FF) - Math.round(2.55 * percent));
    return '#' + (r << 16 | g << 8 | b).toString(16).padStart(6, '0');
  }

  // ─── Toggle ───
  toggle.addEventListener('click', function() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    toggle.classList.toggle('open', isOpen);
    badge.classList.remove('show');

    if (isOpen) {
      input.focus();
      // Load config on first open (lazy load)
      if (!configLoaded && !loading.classList.contains('hidden') === false) {
        loadConfig();
      }
    }
  });

  // Retry button
  retryBtn.addEventListener('click', loadConfig);

  // ─── Auto-resize ───
  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  // ─── Send on Enter ───
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ─── Add message ───
  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = 'scw-msg ' + sender;
    div.textContent = text;
    msgs.insertBefore(div, typing);
    msgs.scrollTop = msgs.scrollHeight;
  }

  // ─── Send to n8n ───
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';

    isLoading = true;
    sendBtn.disabled = true;
    typing.classList.add('show');
    msgs.scrollTop = msgs.scrollHeight;

    // Use the chat webhook from config, or fall back to a default
    const chatUrl = (config && config.webhook_url)
      ? config.webhook_url
      : CONFIG_URL.replace('/config', '/chat');

    try {
      const res = await fetch(chatUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          identifier: config ? (config.tenant_id || TENANT_ID) : TENANT_ID,
          systemPrompt: config ? (config.system_prompt || '') : ''
        })
      });

      const data = await res.json();

      // Parse various n8n response formats
      let reply = '';
      if (typeof data === 'string') reply = data;
      else if (data.output) reply = data.output;
      else if (data.message) reply = data.message;
      else if (data.response) reply = data.response;
      else if (data.text) reply = data.text;
      else if (Array.isArray(data) && data.length > 0)
        reply = data[0].output || data[0].message || data[0].text || JSON.stringify(data[0]);
      else reply = JSON.stringify(data);

      addMessage(reply, 'bot');

      if (!isOpen) badge.classList.add('show');

    } catch (err) {
      console.error('[ChatWidget] Send error:', err);
      addMessage("Sorry, I'm having trouble connecting. Please try again.", 'bot');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      typing.classList.remove('show');
    }
  }

  // ─── Init: load config on first open ───
  // We lazy-load config when the user first opens the chat
  // to avoid an API call if they never interact.
  const originalToggle = toggle.onclick;
  let firstOpen = true;

  toggle.addEventListener('click', function() {
    if (firstOpen) {
      firstOpen = false;
      loadConfig();
    }
  });

})();
</script>

</body>
